// Migrate old keys (CH|M|D) to new format (CH|YEAR|M|D)
function migrateData(data){const nd={};Object.keys(data).forEach(key=>{const p=key.split("|");if(p.length===3){nd[p[0]+"|2026|"+p[1]+"|"+p[2]]=data[key];}else{nd[key]=data[key];}});return nd;}
function migrateHM(hm){const nd={};Object.keys(hm).forEach(key=>{const p=key.split("|");if(p.length===2){nd["2026|"+p[0]+"|"+p[1]]=hm[key];}else{nd[key]=hm[key];}});return nd;}

// ═══════════ STATE ═══════════
let S={
  channels:["RELATOS SORPRENDENTES","RELATOS Y MISTERIOS","SEÑALES","MENTE Y PALABRA","PALABRA Y ESPÍRITU","RELATOS DE LA MENTE","RENOVACIÓN Y FE","MENTE BÍBLICA","ESPÍRITU Y VERDAD","ESENCIA BÍBLICA","MENTE Y FE","POV DEL SEÑOR","POV DE LA BIBLIA","POV DEL CIELO","POV ETERNO","PALABRAS DE DIOS","CAMINO INTERIOR"],

};

// ═══════════ CALCULATIONS ═══════════
function cmtF(c,mo){if(S.noMon[c])return 0;let t=0;for(let d=1;d<=dIn(mo);d++)t+=(S.data[k(c,mo,d)]||0);return t;}
function cmtS(c,mo){if(S.noMon[c])return 0;let t=0;for(let d=1;d<=dIn(mo);d++)t+=spV(c,S.data[k(c,mo,d)]||0);return t;}

function mTF(mo){let t=0;S.channels.forEach(c=>t+=cmtF(c,mo));return t;}
function mTS(mo){let t=0;S.channels.forEach(c=>t+=cmtS(c,mo));return t;}
function yTF(){let t=0;for(let m=0;m<12;m++)t+=mTF(m);return t;}
function yTS(){let t=0;for(let m=0;m<12;m++)t+=mTS(m);return t;}

// Days with data in month
function daysWithData(mo){let n=0;for(let d=1;d<=dIn(mo);d++){let has=false;S.channels.forEach(c=>{if(!S.noMon[c]&&(S.data[k(c,mo,d)]||0)>0)has=true;});if(has)n++;}return n;}
function lastDayWithData(mo){for(let d=dIn(mo);d>=1;d--){let has=false;S.channels.forEach(c=>{if(!S.noMon[c]&&(S.data[k(c,mo,d)]||0)>0)has=true;});if(has)return d;}return 0;}

// Hotmart
function hmDay(mo,d,y){return S.hotmart[(y||UI.year)+"|"+mo+"|"+d]||0;}
function hmMonth(mo,y){let t=0;for(let d=1;d<=dIn(mo,y);d++)t+=hmDay(mo,d,y);return t;}
function hmYear(y){const yr=y||UI.year;let t=0;for(let m=0;m<12;m++)t+=hmMonth(m,yr);return t;}
function hmDaysWithData(mo){let n=0;for(let d=1;d<=dIn(mo);d++)if(hmDay(mo,d)>0)n++;return n;}

// Position tracking - compare current rank vs rank without last day
function posChanges(mo){
  const ld=lastDayWithData(mo);if(ld<2)return {};
  const chList=S.channels.filter(c=>!S.noMon[c]);
  const cur=chList.map(c=>({c,t:cmtS(c,mo)})).sort((a,b)=>b.t-a.t);
  const prev=chList.map(c=>{let t=0;for(let d=1;d<ld;d++)t+=spV(c,S.data[k(c,mo,d)]||0);return{c,t};}).sort((a,b)=>b.t-a.t);
  const curPos={},prevPos={};
  cur.forEach((x,i)=>curPos[x.c]=i+1);
  prev.forEach((x,i)=>prevPos[x.c]=i+1);
  const changes={};
  chList.forEach(c=>{const pp=prevPos[c]||chList.length;const cp=curPos[c]||chList.length;changes[c]=pp-cp;});
  return changes;

  if(change>0)return`<span class="arrow-up">▲${change}</span>`;
  if(change<0)return`<span class="arrow-down">▼${Math.abs(change)}</span>`;
  return`<span class="arrow-same">–</span>`;
}

function rkBestMonths(){const a=[];for(let m=0;m<12;m++){const t=mTF(m),ts=mTS(m);if(t>0)a.push({m,t,ts,y:UI.year});}return a.sort((a,b)=>b.ts-a.ts).slice(0,10);}

const medals=["🥇","🥈","🥉"],mcl=["#FFD700","#C0C0C0","#CD7F32"];

// ═══════════ PERSISTENCE ═══════════
const SK="mntz9";
function persist(){try{localStorage.setItem(SK,JSON.stringify({channels:S.channels,data:S.data,noMon:S.noMon,splits:S.splits,hotmart:S.hotmart}));}catch(e){}if(fbOn&&db)db.ref("rv").set({channels:S.channels,data:S.data,noMon:S.noMon,splits:S.splits,hotmart:S.hotmart});}
function load(){
  // Try new key first, then old key with migration
  let raw=null;
  try{raw=localStorage.getItem(SK);}catch(e){}
  if(!raw){try{raw=localStorage.getItem("mntz8");}catch(e){}}
  if(raw){try{const p=JSON.parse(raw);
    if(p.channels)S.channels=p.channels;
    if(p.data){const keys=Object.keys(p.data);const needsMigrate=keys.length>0&&keys[0].split("|").length===3;S.data=needsMigrate?migrateData(p.data):p.data;}
    if(p.noMon)S.noMon=p.noMon;if(p.splits)S.splits=p.splits;
    if(p.hotmart){const hk=Object.keys(p.hotmart);const hmNeedsMigrate=hk.length>0&&hk[0].split("|").length===2;S.hotmart=hmNeedsMigrate?migrateHM(p.hotmart):p.hotmart;}
  }catch(e){}}
}
let fbL=false;function fbListen(){if(!fbOn||!db||fbL)return;fbL=true;db.ref("rv").on("value",snap=>{const v=snap.val();if(!v)return;if(v.channels)S.channels=v.channels;if(v.data)S.data=v.data;if(v.noMon)S.noMon=v.noMon;if(v.splits)S.splits=v.splits;if(v.hotmart)S.hotmart=v.hotmart;render();});}

// ═══════════ ACTIONS ═══════════
function setVal(c,m,d,v){S.data[k(c,m,d)]=parseFloat(v)||0;persist();}
function setHM(m,d,v){S.hotmart[UI.year+"|"+m+"|"+d]=parseFloat(v)||0;persist();}
function toggleMon(ch){if(S.noMon[ch])delete S.noMon[ch];else S.noMon[ch]=true;hideCtx();persist();render();}
function toggleSplit(ch){if(S.splits[ch])delete S.splits[ch];else S.splits[ch]=true;hideCtx();persist();render();}
function addChannel(nm){if(!nm.trim())return;S.channels.push(nm.trim().toUpperCase());UI.modal=null;persist();render();}
function renameChannel(old,nw){if(!nw.trim()||nw.trim()===old)return;const nu=nw.trim().toUpperCase();const i=S.channels.indexOf(old);if(i<0)return;S.channels[i]=nu;const nd={};Object.keys(S.data).forEach(key=>{if(key.startsWith(old+"|"))nd[nu+"|"+key.slice(old.length+1)]=S.data[key];else nd[key]=S.data[key];});S.data=nd;if(S.noMon[old]){S.noMon[nu]=true;delete S.noMon[old];}if(S.splits[old]){S.splits[nu]=true;delete S.splits[old];}UI.modal=null;persist();render();}
function deleteChannel(ch){S.channels=S.channels.filter(c=>c!==ch);delete S.noMon[ch];delete S.splits[ch];UI.modal=null;persist();render();}
function moveChannel(ch,dir){const i=S.channels.indexOf(ch);if(i<0)return;const ni=dir==='up'?i-1:i+1;if(ni<0||ni>=S.channels.length)return;[S.channels[i],S.channels[ni]]=[S.channels[ni],S.channels[i]];persist();render();}

// ═══════════ CONTEXT MENU ═══════════
function showCtx(ch,ev){ev.stopPropagation();UI.ctx=ch;const p=document.getElementById('ctx-popup');const off=!!S.noMon[ch],sp=isSp(ch);let h=`<div class="ctx-ch">${esc(ch)}</div>`;h+=`<button style="color:${off?"var(--green)":"var(--red)"}" onclick="toggleMon('${esc(ch)}')"><span style="font-size:16px">${off?"✅":"🚫"}</span>${off?"Ativar Monetização":"Desativar Monetização"}</button>`;h+=`<button style="color:${sp?"var(--t2)":"var(--yellow)"}" onclick="toggleSplit('${esc(ch)}')"><span style="font-size:16px">${sp?"👤":"🤝"}</span>${sp?"Remover Sociedade 50%":"Ativar Sociedade 50%"}</button>`;h+=`<div class="sep"></div>`;h+=`<button onclick="hideCtx();UI.modal={type:'rename',ch:'${esc(ch)}'};render()"><span style="font-size:16px">✏️</span>Renomear</button>`;h+=`<button style="color:var(--red)" onclick="hideCtx();UI.modal={type:'delete',ch:'${esc(ch)}'};render()"><span style="font-size:16px">🗑️</span>Excluir</button>`;p.innerHTML=h;p.classList.add('show');let x=ev.clientX,y=ev.clientY+8;if(x+240>window.innerWidth)x=window.innerWidth-250;if(x<8)x=8;if(y<8)y=8;p.style.left=x+'px';p.style.top=y+'px';setTimeout(()=>{const r=p.getBoundingClientRect();if(r.bottom>window.innerHeight)p.style.top=(ev.clientY-r.height-8)+'px';},10);}
function hideCtx(){UI.ctx=null;document.getElementById('ctx-popup').classList.remove('show');}

// ═══════════ EDIT ═══════════
function startEdit(ch,d,type){UI.editing={ch,d,type:type||'ch'};render();}
function saveEdit(){const el=document.getElementById("ed-inp");if(!el||!UI.editing)return;const{ch,d,type}=UI.editing;if(type==='hm')setHM(UI.month,d,el.value);else setVal(ch,UI.month,d,el.value);UI.editing=null;render();}
function edKey(e){
  if(e.key==="Enter"){saveEdit();}
  else if(e.key==="Escape"){UI.editing=null;render();}
  else if(e.key==="Tab"){
    e.preventDefault();const el=document.getElementById("ed-inp");if(!el||!UI.editing)return;
    const{ch,d,type}=UI.editing;
    if(type==='hm'){setHM(UI.month,d,el.value);const nd=e.shiftKey?d-1:d+1;if(nd>=1&&nd<=dIn(UI.month)){UI.editing={ch:'HM',d:nd,type:'hm'};render();}else{UI.editing=null;render();}}
    else{setVal(ch,UI.month,d,el.value);const nd=e.shiftKey?d-1:d+1;if(nd>=1&&nd<=dIn(UI.month)){UI.editing={ch,d:nd,type:'ch'};render();}else{UI.editing=null;render();}}
  }
}

// ═══════════ RANKING CARD ═══════════
function rkCard(title,items,showArrows,changes){
  let h=`<div class="rkc"><div class="rkt">${title}</div>`;
  if(!items.length)return h+`<div style="color:var(--t4);font-size:12px;text-align:center;padding:16px">Sem dados</div></div>`;
  items.forEach((it,i)=>{
    const bg=i<3?`background:rgba(251,191,36,${.08-i*.02})`:"";
    const mbg=i<3?mcl[i]+"22":"rgba(255,255,255,0.05)";const mc2=i<3?mcl[i]:"var(--t3)";
    const arrow=showArrows&&changes&&it.c?arrowHTML(changes[it.c]||0):"";
    const dual=it.ts!==undefined&&Math.abs(it.v-it.ts)>.001;
    h+=`<div class="rki" style="${bg}"><div style="width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:${i<3?14:10}px;font-weight:700;background:${mbg};color:${mc2};flex-shrink:0">${i<3?medals[i]:i+1}</div><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:6px"><span>${esc(it.l)}</span>${arrow}</div>${it.s?`<div style="font-size:10px;color:var(--t3)">${esc(it.s)}</div>`:""}</div><div style="text-align:right;flex-shrink:0"><div style="font-size:13px;font-weight:700;color:var(--green);font-family:'Space Mono',monospace">${fm(it.ts!==undefined?it.ts:it.v)}</div>${dual?`<div style="font-size:9px;color:var(--t3)">real: ${fm(it.v)}</div>`:""}</div></div>`;
  });
  return h+`</div>`;
}

      h+=rkCard("📅 MELHOR MÊS DE "+UI.year,bm.map(d=>({l:MOF[d.m]+" "+d.y,v:d.t,ts:d.ts})));
      h+=rkCard("⭐ TOP 10 MELHORES DIAS DE "+UI.year,rkTD(null).map(d=>({l:d.d+" de "+MOF[d.m],s:DW[dwk(d.m,d.d)],v:d.t,ts:d.ts})));
      h+=rkCard("💎 TOP 10 CANAL/DIA DE "+UI.year,rkTCD(null).map(d=>({l:d.c,s:d.d+" de "+MOF[d.m],v:d.v,ts:d.vs})));
      // Monthly bar chart
      h+=`<div class="rkc"><div class="rkt">📈 FATURAMENTO MENSAL ${UI.year}</div>`;
      MOF.forEach((m,i)=>{const tf=mTF(i),ts=mTS(i),p=yTF()>0?(tf/yTF())*100:0,df=Math.abs(tf-ts)>.001;
        h+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px"><div style="width:36px;font-size:11px;color:var(--t2)">${MO[i]}</div><div style="flex:1;height:18px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden"><div style="width:${p}%;height:100%;background:linear-gradient(90deg,var(--yellow),var(--green));border-radius:3px;min-width:${tf>0?2:0}px"></div></div><div style="width:140px;text-align:right;font-size:11px;font-weight:600;display:flex;gap:6px;justify-content:flex-end"><span style="color:${ts>0?"var(--green)":"var(--t4)"}">${fm(ts)}</span>${df?`<span style="color:var(--t3);font-size:9px">(${fm(tf)})</span>`:""}</div></div>`;});
      h+=`<div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.08);display:flex;justify-content:space-between"><span style="font-size:14px;font-weight:700;font-family:'Orbitron',sans-serif">${UI.year}</span><span style="font-size:16px;font-weight:800;color:var(--green);font-family:'Orbitron',sans-serif">${fm(yTS())}</span></div>${yd?`<div style="display:flex;justify-content:flex-end"><span style="font-size:10px;color:var(--t3)">real: ${fm(yTF())}</span></div>`:""}</div>`;
      h+=`</div>`;
    }
    if(UI.rkView==="general"){
      h+=`<div style="font-size:11px;color:var(--t2);margin-bottom:12px;padding:8px 12px;background:rgba(251,191,36,0.05);border:1px solid rgba(251,191,36,0.15);border-radius:8px">⭐ Ranking geral combina todos os anos: ${YEARS.join(", ")}</div>`;
      h+=`<div class="rkg">`;
      h+=rkCard("⭐ TOP 10 MELHORES DIAS — TODOS OS ANOS",rkAllYearsDays().map(d=>({l:d.d+"/"+MOF[d.m]+"/"+d.y,s:DW[dwk(d.m,d.d,d.y)],v:d.t,ts:d.ts})));
      h+=rkCard("💎 TOP 10 CANAL/DIA — TODOS OS ANOS",rkAllYearsChDays().map(d=>({l:d.c,s:d.d+"/"+MOF[d.m]+"/"+d.y,v:d.v,ts:d.vs})));
      h+=rkCard("📅 MELHORES MESES — TODOS OS ANOS",rkAllYearsMonths().map(d=>({l:MOF[d.m]+" "+d.y,v:d.t,ts:d.ts})));
      h+=rkCard("📊 MELHORES CANAIS — TODOS OS ANOS",rkAllYearsChannels().map(d=>({l:d.c,s:""+d.y,v:d.t,ts:d.ts})));
      h+=`</div>`;
    }
  }

  // ═══════ HOTMART ═══════
  if(UI.tab==="hm"){
    const hmM=hmMonth(UI.month),hmY=hmYear(),hmDwd=hmDaysWithData(UI.month);
    h+=`<div class="mbar">${MO.map((m,i)=>`<button class="mbtn ${UI.month===i?"a":""}" onclick="UI.month=${i};UI.editing=null;render()">${m}</button>`).join("")}</div>`;
    h+=`<div class="crds">
      <div class="crd" style="background:linear-gradient(135deg,rgba(251,146,60,0.15),rgba(251,146,60,0.03))"><div class="crd-l" style="color:var(--orange)">Hotmart ${MO[UI.month]}</div><div class="crd-v" style="color:var(--orange)">${fm(hmM)}</div><div class="crd-s">${hmDwd} dias com vendas</div></div>
      <div class="crd" style="background:linear-gradient(135deg,rgba(251,146,60,0.15),rgba(251,146,60,0.03))"><div class="crd-l" style="color:var(--orange)">Hotmart Anual</div><div class="crd-v" style="color:var(--orange)">${fm(hmY)}</div></div>
      <div class="crd" style="background:linear-gradient(135deg,rgba(16,185,129,0.12),rgba(16,185,129,0.02))"><div class="crd-l" style="color:var(--greenD)">Canais + Hotmart ${MO[UI.month]}</div><div class="crd-v" style="color:var(--green)">${fm(ms+hmM)}</div><div class="crd-s">real: ${fm(mf+hmM)}</div></div>
      <div class="crd" style="background:linear-gradient(135deg,rgba(251,191,36,0.12),rgba(251,191,36,0.02))"><div class="crd-l" style="color:var(--yellow)">Total Geral Anual</div><div class="crd-v" style="color:var(--yellow)">${fm(ys+hmY)}</div><div class="crd-s">real: ${fm(yf+hmY)}</div></div>
    </div>`;

    // Hotmart calendar grid
    h+=`<div class="tw"><table><thead><tr><th style="position:sticky;left:0;z-index:10;background:var(--bg2);text-align:left;min-width:140px;color:var(--orange);border-bottom-color:var(--orange)">HOTMART</th>`;
    for(let i=0;i<dm;i++){const w=dwk(UI.month,i+1),we=w===0||w===6;h+=`<th style="min-width:56px;background:var(--bg2);color:${we?"var(--orange)":"var(--t3)"};border-bottom-color:var(--orange)">${i+1}<div style="font-size:8px;opacity:.7">${DW[w]}</div></th>`;}
    h+=`<th style="position:sticky;right:0;z-index:10;background:rgba(251,146,60,0.08);border-bottom:2px solid var(--orange);color:var(--orange);min-width:76px">TOTAL</th></tr></thead><tbody>`;

    h+=`<tr><td style="position:sticky;left:0;z-index:5;background:var(--bgE);padding:6px;font-weight:700;font-size:11px;color:var(--orange);border-bottom:1px solid rgba(255,255,255,0.04)">🛒 Vendas Hotmart</td>`;
    for(let di=0;di<dm;di++){
      const d=di+1,v=hmDay(UI.month,d),isEd=UI.editing&&UI.editing.type==='hm'&&UI.editing.d===d;
      h+=`<td style="padding:3px 1px;border-bottom:1px solid rgba(255,255,255,0.03);text-align:center;cursor:pointer;background:${isEd?"rgba(251,146,60,0.2)":v>0?"rgba(251,146,60,"+Math.min(0.25,v/100)+")":"transparent"};min-width:56px" ${isEd?"":`onclick="startEdit('HM',${d},'hm')"`}>`;
      if(isEd)h+=`<input class="vinp" id="ed-inp" type="number" step="0.01" value="${v||""}" onblur="saveEdit()" onkeydown="edKey(event)" style="border-color:var(--orange)">`;
      else if(v>0)h+=`<span style="font-size:10px;color:var(--orange);font-weight:600">$${v.toFixed(2)}</span>`;
      else h+=`<span style="font-size:9px;color:rgba(255,255,255,0.08)">·</span>`;
      h+=`</td>`;
    }
    h+=`<td style="position:sticky;right:0;z-index:5;padding:6px;text-align:center;font-weight:700;font-size:12px;color:var(--orange);background:rgba(251,146,60,0.06)">${fm(hmM)}</td></tr></tbody></table></div>`;
    h+=`<div class="hint">💡 Clique na célula para inserir o valor total Hotmart do dia · Tab = próximo dia</div>`;
  }

  // ═══════ RESUMO GERAL ═══════
  if(UI.tab==="sum"){
    const hmY2=hmYear(),yf2=yTF(),ys2=yTS();
    h+=`<div style="margin-bottom:16px"><h2 style="font-family:'Orbitron',sans-serif;font-size:16px;color:var(--yellow);letter-spacing:2px">📊 RESUMO GERAL ${UI.year}</h2></div>`;

    h+=`<div class="crds" style="grid-template-columns:repeat(3,1fr)">
      <div class="crd" style="background:linear-gradient(135deg,rgba(16,185,129,0.15),rgba(16,185,129,0.02))"><div class="crd-l" style="color:var(--greenD)">Canais (sua parte)</div><div class="crd-v" style="color:var(--green)">${fm(ys2)}</div><div class="crd-s">real: ${fm(yf2)}</div></div>
      <div class="crd" style="background:linear-gradient(135deg,rgba(251,146,60,0.15),rgba(251,146,60,0.02))"><div class="crd-l" style="color:var(--orange)">Hotmart</div><div class="crd-v" style="color:var(--orange)">${fm(hmY2)}</div></div>
      <div class="crd" style="background:linear-gradient(135deg,rgba(251,191,36,0.15),rgba(251,191,36,0.02));border:2px solid rgba(251,191,36,0.2)"><div class="crd-l" style="color:var(--yellow)">Total Geral</div><div class="crd-v" style="color:var(--yellow)">${fm(ys2+hmY2)}</div><div class="crd-s">real: ${fm(yf2+hmY2)}</div></div>
    </div>`;

    h+=`<div class="sum-grid">`;
    // Monthly breakdown
    h+=`<div class="sum-card"><h4>📅 POR MÊS</h4>`;
    MOF.forEach((m,i)=>{const cs=mTS(i),cf=mTF(i),hm2=hmMonth(i),tot=cs+hm2,df=Math.abs(cf-cs)>.001;
      if(cf+hm2>0)h+=`<div class="sum-row"><span style="font-size:12px;color:var(--t1);font-weight:600">${MO[i]}</span><div style="text-align:right"><div style="font-size:13px;font-weight:700;color:var(--green)">${fm(tot)}</div><div style="font-size:9px;color:var(--t3)">canais: ${fm(cs)}${df?" (real: "+fm(cf)+")":""}${hm2>0?" · HM: "+fm(hm2):""}</div></div></div>`;
    });
    h+=`</div>`;

    // Channel averages
    h+=`<div class="sum-card"><h4>📺 MÉDIA POR CANAL/MÊS</h4>`;
    S.channels.filter(c=>!S.noMon[c]).map(c=>({c,t:cytS(c),tf:cytF(c)})).sort((a,b)=>b.t-a.t).forEach(x=>{
      const mAvg=x.t/12,df=Math.abs(x.t-x.tf)>.001;
      if(x.tf>0)h+=`<div class="sum-row"><span style="font-size:11px;color:var(--t1);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px">${esc(x.c)}</span><div style="text-align:right"><div style="font-size:12px;font-weight:700;color:var(--green)">${fm(mAvg)}/mês</div>${df?`<div style="font-size:9px;color:var(--t3)">real: ${fm(x.tf/12)}/mês</div>`:""}</div></div>`;
    });
    h+=`</div>`;

    // Channel avg per day
    h+=`<div class="sum-card"><h4>📊 MÉDIA POR CANAL/DIA</h4>`;
    S.channels.filter(c=>!S.noMon[c]).map(c=>{let days=0;for(let m=0;m<12;m++)for(let d=1;d<=dIn(m);d++)if((S.data[k(c,m,d)]||0)>0)days++;return{c,t:cytS(c),tf:cytF(c),days};}).sort((a,b)=>b.t-a.t).forEach(x=>{
      if(x.days>0){const avg=x.t/x.days,df=Math.abs(x.t-x.tf)>.001;
        h+=`<div class="sum-row"><span style="font-size:11px;color:var(--t1);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px">${esc(x.c)}</span><div style="text-align:right"><div style="font-size:12px;font-weight:700;color:var(--green)">${fm(avg)}/dia</div><div style="font-size:9px;color:var(--t3)">${x.days} dias${df?" · real: "+fm(x.tf/x.days)+"/dia":""}</div></div></div>`;}
    });
    h+=`</div>`;

    // Year averages
    const totalDaysWithAny=((()=>{let n=0;for(let m=0;m<12;m++)n+=daysWithData(m);return n;})());
    h+=`<div class="sum-card"><h4>📈 MÉDIAS GERAIS</h4>`;
    h+=`<div class="sum-row"><span style="color:var(--t1);font-weight:600">Média mensal (canais)</span><span style="font-weight:700;color:var(--green)">${fm(ys2/12)}</span></div>`;
    h+=`<div class="sum-row"><span style="color:var(--t1);font-weight:600">Média diária estimada</span><span style="font-weight:700;color:var(--green)">${totalDaysWithAny>0?fm(ys2/totalDaysWithAny):"$0.00"}</span></div>`;
    h+=`<div class="sum-row"><span style="color:var(--t1);font-weight:600">Média mensal (HM)</span><span style="font-weight:700;color:var(--orange)">${fm(hmY2/12)}</span></div>`;
    h+=`<div class="sum-row"><span style="color:var(--t1);font-weight:600">Média mensal (total)</span><span style="font-weight:700;color:var(--yellow)">${fm((ys2+hmY2)/12)}</span></div>`;
    h+=`</div>`;
    h+=`</div>`;
  }

  // ═══════ CHANNEL MANAGER ═══════
  if(UI.tab==="mgr"){
    const monC=S.channels.filter(c=>!S.noMon[c]).length,nmC=S.channels.filter(c=>S.noMon[c]).length;
    h+=`<div class="ch-mgr"><h3>⚙️ GERENCIAR CANAIS (${S.channels.length})</h3>`;
    h+=`<div style="font-size:11px;color:var(--t2);margin-bottom:14px"><span style="color:var(--green)">${monC} monetizados</span>${nmC>0?` · <span style="color:var(--red)">${nmC} não monetizados</span>`:""} · ${Object.keys(S.splits).length} em sociedade</div>`;
    S.channels.forEach((ch,i)=>{
      const off=!!S.noMon[ch],sp=isSp(ch),pov=ch.startsWith("POV");
      const icon=off?"🚫":sp?"🤝":pov?"🎬":"📺";
      const clr=off?"var(--red)":sp?"var(--yellow)":pov?"var(--pink)":"var(--t1)";
      h+=`<div class="ch-row" style="opacity:${off?.5:1}"><span style="font-size:15px;flex-shrink:0">${icon}</span><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;color:${clr};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(ch)}</div><div style="font-size:9px;color:var(--t3);display:flex;gap:6px;flex-wrap:wrap">${off?'<span style="color:var(--red)">não monetizado</span>':""}${sp?'<span style="color:var(--yellow)">sociedade 50%</span>':""}<span>total: ${fm(cytF(ch))}</span></div></div>
      <div style="display:flex;gap:3px;flex-wrap:wrap">
        <button class="ch-btn" onclick="toggleMon('${esc(ch)}')">${off?"✅":"🚫"}</button>
        <button class="ch-btn" style="${sp?"color:var(--yellow)":""}" onclick="toggleSplit('${esc(ch)}')">${sp?"👤":"🤝"}</button>
        <button class="ch-btn" onclick="UI.modal={type:'rename',ch:'${esc(ch)}'};render()">✏️</button>
        ${i>0?`<button class="ch-btn" onclick="moveChannel('${esc(ch)}','up')">⬆️</button>`:""}
        ${i<S.channels.length-1?`<button class="ch-btn" onclick="moveChannel('${esc(ch)}','down')">⬇️</button>`:""}
        <button class="ch-btn" style="color:var(--red)" onclick="UI.modal={type:'delete',ch:'${esc(ch)}'};render()">🗑️</button>
      </div></div>`;
    });
    h+=`<div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--brd)"><button class="tbtn a" style="width:100%;padding:14px;font-size:14px;font-family:'Orbitron',sans-serif;letter-spacing:2px" onclick="UI.modal={type:'add'};render()">➕ ADICIONAR NOVO CANAL</button></div></div>`;
  }

  // MODAL
  if(UI.modal){const m=UI.modal;
    h+=`<div class="modal-bg" onclick="UI.modal=null;render()"><div class="modal" onclick="event.stopPropagation()">`;
    if(m.type==="add")h+=`<h2>➕ NOVO CANAL</h2><label>Nome do canal</label><input type="text" id="mi" placeholder="Ex: MEU NOVO CANAL" onkeydown="if(event.key==='Enter')addChannel(this.value)"><div class="btns"><button class="btn btn-s" onclick="UI.modal=null;render()">Cancelar</button><button class="btn btn-p" onclick="addChannel(document.getElementById('mi').value)">Adicionar</button></div>`;
    if(m.type==="rename")h+=`<h2>✏️ RENOMEAR</h2><label>Canal: <b style="color:var(--yellow)">${esc(m.ch)}</b></label><input type="text" id="mi" value="${esc(m.ch)}" onkeydown="if(event.key==='Enter')renameChannel('${esc(m.ch)}',this.value)"><div class="btns"><button class="btn btn-s" onclick="UI.modal=null;render()">Cancelar</button><button class="btn btn-p" onclick="renameChannel('${esc(m.ch)}',document.getElementById('mi').value)">Salvar</button></div>`;
    if(m.type==="delete"){const yt2=cytF(m.ch);h+=`<h2>🗑️ EXCLUIR</h2><p style="font-size:14px;color:var(--t2);margin-bottom:10px">Excluir <b style="color:var(--red)">${esc(m.ch)}</b>?</p>${yt2>0?`<p style="font-size:11px;color:var(--yellow);padding:10px;background:rgba(251,191,36,0.08);border-radius:8px;margin-bottom:10px">⚠️ ${fm(yt2)} em receita registrada.</p>`:""}<div class="btns"><button class="btn btn-s" onclick="UI.modal=null;render()">Cancelar</button><button class="btn btn-d" onclick="deleteChannel('${esc(m.ch)}')">Excluir</button></div>`;}
    h+=`</div></div>`;
  }

  h+=`</div>`;
  document.getElementById("app").innerHTML=h;
  if(UI.editing){const el=document.getElementById("ed-inp");if(el){el.focus();el.select();}}
  if(UI.modal){const el=document.getElementById("mi");if(el)el.focus();}
}

document.addEventListener("click",e=>{if(UI.ctx&&!document.getElementById('ctx-popup').contains(e.target))hideCtx();});
load();fbListen();render();
</script>
</body>
</html>
